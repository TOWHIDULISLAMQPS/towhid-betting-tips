<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#071826;
    color:#fff;
}

.header{
    background:#00d95f;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:600px;
    margin:20px auto;
}

.card{
    background:#10263d;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.card h2{
    color:#00ff7f;
    margin-bottom:15px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

textarea{
    min-height:90px;
    resize:vertical;
}

button{
    width:100%;
    padding:14px;
    background:#00d95f;
    color:#fff;
    border:none;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00b84d;
}

.tipBox{
    background:#1a2d45;
    padding:12px;
    border-radius:10px;
    margin-top:12px;
}

.tipTitle{
    color:#00ff7f;
    font-weight:bold;
    margin-bottom:8px;
}

.action{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.editBtn{
    flex:1;
    background:#ff9800;
}

.deleteBtn{
    flex:1;
    background:#f44336;
}

.logout{
    display:block;
    text-align:center;
    background:#ff3b30;
    color:#fff;
    text-decoration:none;
    padding:15px;
    border-radius:10px;
    margin:20px 0;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
🛠 Admin Control Panel
</div>

<div class="container">

<!-- Football -->

<div class="card">

<h2>⚽ Football Tips</h2>

<input
type="text"
id="footballMatch"
placeholder="Match Name">

<textarea
id="footballPrediction"
placeholder="Prediction"></textarea>

<button id="saveFootball">
💾 Save Football Tip
</button>

</div>

<!-- Cricket -->

<div class="card">

<h2>🏏 Cricket Tips</h2>

<input
type="text"
id="cricketMatch"
placeholder="Match Name">

<textarea
id="cricketPrediction"
placeholder="Prediction"></textarea>

<button id="saveCricket">
💾 Save Cricket Tip
</button>

</div>

<!-- VIP -->

<div class="card">

<h2>🔥 VIP Tips</h2>

<input
type="text"
id="vipMatch"
placeholder="VIP Match">

<textarea
id="vipPrediction"
placeholder="VIP Prediction"></textarea>

<button id="saveVip">
💾 Save VIP Tip
</button>

</div>

<!-- Saved Football -->

<div class="card">

<h2>📋 Saved Football Tips</h2>

<div id="footballList">
No Football Tips
</div>

</div>

<!-- Saved Cricket -->

<div class="card">

<h2>📋 Saved Cricket Tips</h2>

<div id="cricketList">
No Cricket Tips
</div>

</div>

<!-- Saved VIP -->

<div class="card">

<h2>📋 Saved VIP Tips</h2>

<div id="vipList">
No VIP Tips
</div>

</div>

<a href="login.html" class="logout">
Logout
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
    getDatabase,
    ref,
    push,
    onValue,
    remove,
    set
    get
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyDn8fTAW2EVv_Q7zhKB1bUdHoZFin1wNqE",
  authDomain: "towhid-betting-tips.firebaseapp.com",
  databaseURL: "https://towhid-betting-tips-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "towhid-betting-tips",
  storageBucket: "towhid-betting-tips.firebasestorage.app",
  messagingSenderId: "204379750828",
  appId: "1:204379750828:web:92e498f3c5d18ead113a09"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ==========================
   FOOTBALL SAVE
========================== */

document.getElementById("saveFootball").addEventListener("click",()=>{

    const match=document.getElementById("footballMatch").value.trim();
    const prediction=document.getElementById("footballPrediction").value.trim();

    if(match==="" || prediction===""){
        alert("Please fill all fields");
        return;
    }

    push(ref(db,"footballTips"),{

        match:match,
        prediction:prediction,
        time:Date.now()

    }).then(()=>{

        alert("Football Tip Saved");

        document.getElementById("footballMatch").value="";
        document.getElementById("footballPrediction").value="";

    });

});

/* ==========================
   FOOTBALL SHOW
========================== */

const footballList=document.getElementById("footballList");

onValue(ref(db,"footballTips"),(snapshot)=>{

    footballList.innerHTML="";

    if(!snapshot.exists()){

        footballList.innerHTML="No Football Tips";

        return;

    }

    let number=1;

    const data=[];

    snapshot.forEach(child=>{

        data.push({
            key:child.key,
            ...child.val()
        });

    });

    data.sort((a,b)=>b.time-a.time);

    data.forEach(item=>{

        footballList.innerHTML+=`

<div class="tipBox">

<div class="tipTitle">
${number}. ${item.match}
</div>

<div>
${item.prediction}
</div>

<div class="action">

<button
class="editBtn"
onclick="editFootball('${item.key}','${item.match.replace(/'/g,"\\'")}','${item.prediction.replace(/'/g,"\\'")}')">

✏ Edit

</button>

<button
class="deleteBtn"
onclick="deleteFootball('${item.key}')">

🗑 Delete

</button>

</div>

</div>

`;

number++;

});

});

/* ==========================
   FOOTBALL DELETE
========================== */

globalThis.deleteFootball=function(key){

if(confirm("Delete this tip?")){

remove(ref(db,"footballTips/"+key));

}

}

/* ==========================
   FOOTBALL EDIT
========================== */

globalThis.editFootball=function(key,match,prediction){

const newMatch=prompt("Match Name",match);

if(newMatch===null) return;

const newPrediction=prompt("Prediction",prediction);

if(newPrediction===null) return;

set(ref(db,"footballTips/"+key),{

match:newMatch,

prediction:newPrediction,

time:Date.now()

}).then(()=>{

alert("Updated Successfully");

});

}
/* ==========================
   CRICKET SAVE
========================== */

document.getElementById("saveCricket").addEventListener("click",()=>{

const match=document.getElementById("cricketMatch").value.trim();
const prediction=document.getElementById("cricketPrediction").value.trim();

if(match==="" || prediction===""){
alert("Please fill all fields");
return;

alert("Cricket Tip Saved");

document.getElementById("cricketMatch").value="";
document.getElementById("cricketPrediction").value="";

/* ==========================
   CRICKET SHOW
========================== */

cricketList.innerHTML="";

if(!snapshot.exists()){

cricketList.innerHTML="No Cricket Tips";
return;

}

let number=1;

const data=[];

snapshot.forEach(child=>{

data.push({
key:child.key,
...child.val()

data.sort((a,b)=>b.time-a.time);

data.forEach(item=>{

cricketList.innerHTML+=`

<div class="tipBox">

<div class="tipTitle">
${number}. ${item.match}
</div>

<div>
${item.prediction}
</div>

<div class="action">

<button
class="editBtn"
onclick="editCricket('${item.key}','${item.match.replace(/'/g,"\\'")}','${item.prediction.replace(/'/g,"\\'")}')">

✏ Edit

</button>

<button
class="deleteBtn"
onclick="deleteCricket('${item.key}')">

🗑 Delete

</button>

</div>

</div>

`;

number++;

});

});


/* ==========================
   CRICKET DELETE
========================== */

globalThis.deleteCricket=function(key){

if(confirm("Delete this tip?")){

remove(ref(db,"cricketTips/"+key));

}

}


/* ==========================
   CRICKET EDIT
========================== */

globalThis.editCricket=function(key,match,prediction){

const newMatch=prompt("Match Name",match);

if(newMatch===null) return;

const newPrediction=prompt("Prediction",prediction);

if(newPrediction===null) return;

set(ref(db,"cricketTips/"+key),{

match:newMatch,
prediction:newPrediction,

alert("Updated Successfully");

});

}
/* ==========================
   VIP SAVE
========================== */

const match=document.getElementById("vipMatch").value.trim();
const prediction=document.getElementById("vipPrediction").value.trim();

if(match==="" || prediction===""){
alert("Please fill all fields");
return;
}

push(ref(db,"vipTips"),{

}).then(()=>{

alert("VIP Tip Saved");

document.getElementById("vipMatch").value="";
document.getElementById("vipPrediction").value="";

});

});


/* ==========================
   VIP SHOW
========================== */

const vipList=document.getElementById("vipList");

onValue(ref(db,"vipTips"),(snapshot)=>{

vipList.innerHTML="";

if(!snapshot.exists()){

vipList.innerHTML="No VIP Tips";
return;

}

let number=1;

const data=[];

snapshot.forEach(child=>{

data.push({

...child.val()
});

});

data.sort((a,b)=>b.time-a.time);

data.forEach(item=>{

vipList.innerHTML+=`

<div class="tipBox">

<div class="tipTitle">
${number}. ${item.match}
</div>

<div>
${item.prediction}
</div>

<div class="action">

<button
class="editBtn"
onclick="editVip('${item.key}','${item.match.replace(/'/g,"\\'")}','${item.prediction.replace(/'/g,"\\'")}')">
✏ Edit
</button>

<button
class="deleteBtn"
onclick="deleteVip('${item.key}')">
🗑 Delete
</button>

</div>

</div>

`;

number++;

});

});


/* ==========================
   VIP DELETE
========================== */

globalThis.deleteVip=function(key){

if(confirm("Delete this tip?")){

remove(ref(db,"vipTips/"+key));

}

}


/* ==========================
   VIP EDIT
========================== */

globalThis.editVip=function(key,match,prediction){

const newMatch=prompt("Match Name",match);
if(newMatch===null) return;

const newPrediction=prompt("Prediction",prediction);

}

</script>
</body>
</html>
