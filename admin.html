<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#071826;
color:#fff;
}

.header{
background:#00d95f;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
max-width:500px;
margin:20px auto;
}

.card{
background:#10263d;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.card h2{
color:#00ff7f;
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#00d95f;
color:#fff;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.logout{
display:block;
text-align:center;
background:#ff3b30;
color:white;
text-decoration:none;
padding:15px;
border-radius:10px;
margin-top:20px;
}
</style>
</head>

<body>
<div class="header">
🛠 Admin Control Panel
</div>

<div class="container">

<div class="card">
<h2>⚽ Football Tips</h2>

<input type="text" id="footballMatch" placeholder="Match Name">

<textarea id="footballPrediction" placeholder="Prediction"></textarea>

<button id="saveFootball">💾 Save Football Tip</button>

</div>

<div class="card">
<h2>🏏 Cricket Tips</h2>

<input type="text" id="cricketMatch" placeholder="Match Name">

<textarea id="cricketPrediction" placeholder="Prediction"></textarea>

<button id="saveCricket">💾 Save Cricket Tip</button>

</div>

<div class="card">
<h2>🔥 VIP Tips</h2>

<input type="text" id="vipMatch" placeholder="VIP Match">

<textarea id="vipPrediction" placeholder="VIP Prediction"></textarea>

<button id="saveVip">💾 Save VIP Tip</button>

</div>

<div class="card">
<h2>📋 Saved Football Tips</h2>

<div id="footballList"></div>

</div>

<div class="card">
<h2>📋 Saved Cricket Tips</h2>

<div id="cricketList"></div>

</div>

<div class="card">
<h2>📋 Saved VIP Tips</h2>

<div id="vipList"></div>

</div>

<a href="login.html" class="logout">Logout</a>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
  getDatabase,
  ref,
  push,
  onValue,
  remove,
  set
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDn8fTAW2EVv_Q7zhKB1bUdHoZFin1wNqE",
  authDomain: "towhid-betting-tips.firebaseapp.com",
  databaseURL: "https://towhid-betting-tips-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "towhid-betting-tips",
  storageBucket: "towhid-betting-tips.firebasestorage.app",
  messagingSenderId: "204379750828",
  appId: "1:204379750828:web:92e498f3c5d18ead113a09"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// SAVE FOOTBALL TIP
document.getElementById("saveFootball").addEventListener("click", () => {

    const match = document.getElementById("footballMatch").value.trim();
    const prediction = document.getElementById("footballPrediction").value.trim();

    if(match==="" || prediction===""){
        alert("Please fill all fields");
        return;
    }

    push(ref(db,"footballTips"),{
        match:match,
        prediction:prediction,
        time:Date.now()
    })
    .then(()=>{
        alert("Football Tip Saved Successfully");

        document.getElementById("footballMatch").value="";
        document.getElementById("footballPrediction").value="";
    })
    .catch((error)=>{
        alert(error.message);
        console.log(error);
    });

});

// SHOW FOOTBALL TIPS
const footballList = document.getElementById("footballList");
const footballList = document.getElementById("footballList");

onValue(ref(db, "footballTips"), (snapshot) => {

    footballList.innerHTML = "";

    let i = 1;

    snapshot.forEach((child) => {

        const key = child.key;
        const data = child.val();

        footballList.innerHTML += `
        <div style="padding:10px;margin:10px 0;background:#1a2d45;border-radius:8px">
            <b>${i}. ${data.match}</b><br>
            ${data.prediction}<br><br>

            <button onclick="editFootball('${key}','${data.match}','${data.prediction}')">
            ✏ Edit
            </button>

            <button onclick="deleteFootball('${key}')" style="background:red">
            🗑 Delete
            </button>
        </div>
        `;

        i++;

    });

});

// Delete
globalThis.deleteFootball = function(key){

    if(confirm("Delete this tip?")){
        remove(ref(db,"footballTips/"+key));
    }

}

// Edit
globalThis.editFootball = function(key,match,prediction){

    const newMatch = prompt("Match Name", match);
    if(newMatch === null) return;

    const newPrediction = prompt("Prediction", prediction);
    if(newPrediction === null) return;

    set(ref(db,"footballTips/"+key),{
        match:newMatch,
        prediction:newPrediction,
        time:Date.now()
    }).then(()=>{
        alert("Updated Successfully");
    });

}
</script>
</body>
</html>
