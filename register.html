<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#071826;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.register-box{
    width:90%;
    max-width:350px;
    background:#10263d;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.register-box h2{
    color:#00d95f;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#00d95f;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00b84f;
}

p{
    margin-top:15px;
    color:white;
}

a{
    color:#00d95f;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="register-box">

<h2>📝 Create Account</h2>

<form action="login.html">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<input type="password" placeholder="Confirm Password" required>

<button type="submit">Create Account</button>

</form>

<p>Already have an account?</p>

<a href="login.html">Login Here</a>

</div>

</body>
</html>
