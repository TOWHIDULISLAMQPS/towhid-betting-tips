<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#071826;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:90%;
    max-width:350px;
    background:#10263d;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

.login-box h2{
    color:#00d95f;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#00d95f;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00b84f;
}

p{
    margin-top:15px;
    color:white;
}

a{
    color:#00d95f;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="login-box">

<h2>🔐 Login</h2>

<form>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>
<button type="button" id="loginBtn">Login</button>
    
</form>
    
<p>Don't have an account?</p>
<a href="register.html">Create Account</a>

</div>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDn8fTAW2EVv_Q7zhKB1bUdHoZFin1wNqE",
  authDomain: "towhid-betting-tips.firebaseapp.com",
  databaseURL: "https://towhid-betting-tips-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "towhid-betting-tips",
  storageBucket: "towhid-betting-tips.firebasestorage.app",
  messagingSenderId: "204379750828",
  appId: "1:204379750828:web:92e498f3c5d18ead113a09"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "admin.html";
    })
    .catch((error) => {
      alert(error.message);
    });
});
</script>
</body>
</html>
